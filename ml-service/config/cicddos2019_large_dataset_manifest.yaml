## Aşama 14.11-B — Chunk-based Cross-day CIC-DDoS2019 Dataset Build

### Durum
Tamamlandı.

### Çıktılar
- `ml-service/datasets/processed/cicddos2019_train_01_12_sampled.csv`
- `ml-service/datasets/processed/cicddos2019_holdout_03_11_sampled.csv`
- `ml-service/datasets/metadata/cicddos2019_cross_day_build_report.json`
- `ml-service/datasets/metadata/cicddos2019_cross_day_feature_columns.json`
- `ml-service/datasets/metadata/cicddos2019_train_attack_distribution.csv`
- `ml-service/datasets/metadata/cicddos2019_holdout_attack_distribution.csv`

### Train Set
- Kaynak: CSV-01-12
- Satır sayısı: 3,356,863
- Feature sayısı: 81
- Saldırı türleri: dns, ldap, mssql, ntp, netbios, snmp, ssdp, udp, syn, tftp, udplag
- Her saldırı türünden en fazla 300.000 satır alınmıştır.
- Benign satır sayısı: 56.863

### Holdout Set
- Kaynak: CSV-03-11
- Satır sayısı: 1,558,838
- Feature sayısı: 81
- Saldırı türleri: netbios, ldap, mssql, syn, udp, udplag
- Portmap başarıyla dışarıda bırakılmıştır.
- Benign satır sayısı: 56.965

### Kritik Not
Bu veri seti reduced pilot dataset’e göre çok daha büyük ve temsilîdir. Yeni model eğitimi bu cross-day yapı üzerinden yapılacaktır.

