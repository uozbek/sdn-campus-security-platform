  build_report_json: ml-service/datasets/metadata/cicddos2019_cross_day_build_report.json

split_strategy:
  type: cross_day
  train_day: CSV-01-12
  holdout_day: CSV-03-11

label_columns:
  candidates:
    - Label
    - label
    - Attack
    - attack

id_columns_to_drop:
