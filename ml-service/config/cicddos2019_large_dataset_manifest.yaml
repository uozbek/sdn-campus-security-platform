  holdout_csv: ml-service/datasets/processed/cicddos2019_holdout_03_11.csv
  holdout_sampled_csv: ml-service/datasets/processed/cicddos2019_holdout_03_11_sampled.csv

  train_label_distribution_csv: ml-service/datasets/metadata/cicddos2019_train_label_distribution.csv
  train_attack_distribution_csv: ml-service/datasets/metadata/cicddos2019_train_attack_distribution.csv
  holdout_label_distribution_csv: ml-service/datasets/metadata/cicddos2019_holdout_label_distribution.csv
